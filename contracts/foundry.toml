[profile.default]
src = "src"
out = "out"
test = "test"
script = "script"
libs = ["lib"]
solc = "0.8.23"
optimizer = true
optimizer_runs = 200
fs_permissions = [{ access = "read", path = "./" }]

# Katana mainnet fork target for tests. chainId 747474; standard EVM — the Morpho Blue
# liquidate path is byte-identical to Base/Monad (real Morpho at 0xD50F2Dff… is used on the
# fork). Set KATANA_RPC_URL to run the fork tests; they early-return green when it is unset.
[rpc_endpoints]
katana = "${KATANA_RPC_URL}"
